services:
  # --- CAMADA 1: DATABASES (Relational & ELK) ---
  db_server:
    container_name: energy_db_server
    image: postgres:15
    restart: always
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - ./src/databases/init-scripts:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-piacd_energy} -d ${DB_NAME:-energy_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: energy_elastic
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - db_net
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    container_name: energy_logstash
    restart: always
    volumes:
      - ./src/databases/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    networks:
      - db_net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: energy_kibana
    restart: always
    ports:
      - "5601:5601"
    networks:
      - api_net
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --- CAMADA 2: BACKEND (API) ---
  api:
    build: 
      context: .
      dockerfile: src/api/Dockerfile
    container_name: energy_api
    restart: always
    env_file: .env
    environment:
      - DB_HOST=db_server
      - LOGSTASH_HOST=logstash
    networks:
      - db_net
      - api_net
    volumes:
      - ./data:/app/data
    depends_on:
      db_server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- CAMADA 3: FRONTEND (APP) ---
  app:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    container_name: energy_app
    restart: on-failure
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - api_net
    depends_on:
      api:
        condition: service_healthy

  # --- AUXILIAR: DATA PIPELINE ---
  pipeline:
    build:
      context: .
      dockerfile: src/data_pipeline/Dockerfile
    container_name: energy_pipeline
    profiles: ["tools"]
    env_file: .env
    volumes:
      - ./data:/app/data
    networks:
      - db_net
    depends_on:
      db_server:
        condition: service_healthy

networks:
  api_net:
    driver: bridge
  db_net:
    driver: bridge

volumes:
  postgres_data:
  elastic_data:
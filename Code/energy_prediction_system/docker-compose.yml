services:
  # --- CAMADA 0: GATEWAY (TRAEFIK) ---
  traefik:
    image: traefik:v2.10
    container_name: energy_gateway
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=api_net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8080"
      - "--ping=true"
      - "--log.level=INFO"
      - "--entrypoints.web.transport.respondingtimeouts.readtimeout=25s"
      - "--entrypoints.web.transport.respondingtimeouts.writetimeout=25s"
      - "--entrypoints.web.transport.respondingtimeouts.idletimeout=25s"
    ports:
      - "80:80"       # Entrada principal (API e App)
      - "8080:8080"   # Dashboard do Traefik
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - api_net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # --- CAMADA 1: DATABASES (Relational & ELK) ---
  db_server:
    container_name: energy_db_server
    image: postgres:15
    restart: always
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - ./src/databases/init-scripts:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piacd_energy -d energy_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: energy_elastic
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - db_net
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    container_name: energy_logstash
    restart: always
    volumes:
      - ./src/databases/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    networks:
      - db_net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: energy_kibana
    restart: always
    ports:
      - "5601:5601"
    networks:
      - api_net
      - db_net
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --- CAMADA 2: BACKEND (API) ---
  api:
    build: 
      context: .
      dockerfile: src/api/Dockerfile
    container_name: energy_api
    restart: always
    env_file: .env
    environment:
      - DB_HOST=db_server
      - DB_PORT=5432
      - LOGSTASH_HOST=logstash
      - PYTHONPATH=/app
    networks:
      - db_net
      - api_net
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      db_server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=api_net"
      - "traefik.http.routers.energy-api.rule=(Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.energy-api.entrypoints=web"
      - "traefik.http.routers.energy-api.priority=10"
      # QA6: Rate Limiting
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=200"
      - "traefik.http.routers.energy-api.middlewares=api-ratelimit"
      - "traefik.http.services.energy-api.loadbalancer.server.port=8000"


  # --- CAMADA 3: FRONTEND (APP) ---
  app:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    container_name: energy_app
    restart: on-failure
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - api_net
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=api_net"
      - "traefik.http.routers.energy-app.rule=(Host(`localhost`) || Host(`127.0.0.1`))"
      - "traefik.http.routers.energy-app.entrypoints=web"
      - "traefik.http.routers.energy-app.priority=1"
      - "traefik.http.services.energy-app.loadbalancer.server.port=3000"

  # --- AUXILIAR: DATA PIPELINE ---
  pipeline:
    build:
      context: .
      dockerfile: src/data_pipeline/Dockerfile
    container_name: energy_pipeline
    profiles: ["tools"]
    command: ["sh", "/app/src/data_pipeline/run_pipeline.sh"]
    env_file: .env
    environment:
      - DB_HOST=db_server
      - DB_PORT=5432
      - PYTHONPATH=/app/src
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - db_net
    depends_on:
      db_server:
        condition: service_healthy

  real_time_pipeline:
    build:
      context: .
      dockerfile: src/data_pipeline/Dockerfile
    container_name: energy_realtime_pipeline
    restart: always
    command: ["python", "-m", "data_pipeline.real_time_pipeline"]
    env_file: .env
    environment:
      - DB_HOST=db_server
      - DB_PORT=5432
      - PYTHONPATH=/app/src
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - db_net
    depends_on:
      db_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /app/data/processed/realtime_hourly.csv -mmin -65"]
      interval: 5m
      timeout: 10s
      retries: 3

networks:
  api_net:
    driver: bridge
    name: api_net
  db_net:
    driver: bridge
    name: db_net

volumes:
  postgres_data:
  elastic_data:

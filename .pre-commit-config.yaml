repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.3.5
    hooks:
      # Run the linter and auto-fix, allowing 120 chars
      - id: ruff
        args: [ --fix, --line-length=120 ]
      # Run the formatter, allowing 120 chars
      - id: ruff-format
        args: [ --line-length=120 ]
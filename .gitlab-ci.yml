image: python:3.11


variables:
  BUILD_TYPE: draft # you can change e.g. to "release" when the time comes

before_script:
  - python --version
  - pip install pytest
  - pip install pytest pytest-cov
  - echo "Hello, $GITLAB_USER_LOGIN!"
  - echo $REPO_NAME
  - echo $CI_COMMIT_BRANCH
  - echo $CI_PROJECT_DIR
  - pwd


stages:
    - unit_tests
    - quality
    - integration_tests
    - security


# ========== UNIT TESTING stage ========== #

tests_add:
  stage: unit_tests
  script:
    - echo "Running unit tests for add... "
    - echo $CI_COMMIT_BRANCH
    - cd $CI_PROJECT_DIR/Code/calculator/our_add
    - pytest

# ========== INTEGRATION TESTING stage ========== #

integration:
  stage: integration_tests
  script:
    - echo "Running integration tests at calculator level... "
    - echo $CI_COMMIT_BRANCH
    - cd $CI_PROJECT_DIR/Code/calculator/
    - pytest test_calculator.py

test_coverage:
  stage: integration_tests
  script:
  - echo "Assessing test coverage... "
  - echo $CI_COMMIT_BRANCH
  - cd $CI_PROJECT_DIR/Code/calculator/
  - pytest --cov=. --cov-report=html --cov-report=term # report goes to terminal and htmlcov → open 'index.html' in a browser
  artifacts:
    paths:
      - $CI_PROJECT_DIR/Code/calculator/htmlcov/ # Preserve the html coverage files as an artifact
    expire_in: 1 day  # (Optional) Specify how long to keep the artifact (e.g., 1 week, 1 day, never).


# ========== QUALITY stage ========== #

coding_style:
  stage: quality
  before_script:
    - pip install flake8
  script:
    - echo "Checking coding style... "
    - echo $CI_COMMIT_BRANCH
    - cd $CI_PROJECT_DIR/Code/calculator
    - flake8 --max-line-length=120 calculator.py
  allow_failure: true # default is false;

code_complexity:
  stage: quality
  before_script:
    - pip install xenon
  script:
    - echo "Checking code complexity... "
    - echo $CI_COMMIT_BRANCH~                    # -b A : At least one block has a complexity rank higher than A (i.e. B, C, D, E or F)
    - cd $CI_PROJECT_DIR/Code/calculator         # -m A : At least one module has a complexity rank higher than A (i.e. B, C, D, E or F)
    - xenon -b C -m C -a C --ignore='venv' .     # -a A : Average complexity has rank higher than A (i.e. B , C, D, E or F)
  allow_failure: true # default is false;


# ========== SECURITY stage ========== #

security:
  stage: security
  before_script:
    - pip install bandit
  script:
    - echo "Running security tests at application level... "
    - echo $CI_COMMIT_BRANCH
    - cd $CI_PROJECT_DIR/Code/calculator/
    - bandit ./calculator.py
  allow_failure: false # set to false - security should NEVER be compromised



